services:
  db:
    image: postgres:15-alpine
    container_name: gov-voting-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: voteapp
      POSTGRES_DB: voteapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine

    container_name: gov-voting-redis

    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: gov-voting-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=adminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gov-voting-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:voteapp@db:5432/voteapp?schema=public
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=adminpassword
    env_file:
      - path: ./backend/.env.development
        required: false
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
      - minio

  frontend:
    build:
      context: ./public/my-app
      dockerfile: Dockerfile.dev
    container_name: gov-voting-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WDS_SOCKET_PORT=0
    volumes:
      - ./public/my-app:/app
      - /app/node_modules
    depends_on:
      - backend

  admin:
    build:
      context: ./admin/my-app
      dockerfile: Dockerfile.dev
    container_name: gov-voting-admin
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - WDS_SOCKET_PORT=0
    volumes:
      - ./admin/my-app:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: gov-voting-nginx
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - admin

volumes:
  pgdata:
  minio_data:
